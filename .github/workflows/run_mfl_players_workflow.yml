name: Run mfl_players pipeline from players.py

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: null

env:
  DESTINATION__BIGQUERY__CREDENTIALS__PROJECT_ID: mfl-374514
  DESTINATION__BIGQUERY__CREDENTIALS__CLIENT_EMAIL: mfl-orchestrator@mfl-374514.iam.gserviceaccount.com
  DESTINATION__BIGQUERY__LOCATION: US
  API_SECRET_KEY: ${{ secrets.API_SECRET_KEY }}
  DESTINATION__BIGQUERY__CREDENTIALS__PRIVATE_KEY: ${{ secrets.GCP_PRIVATE_KEY }}

jobs:
  maybe_skip:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@v5
        with:
          concurrent_skipping: always
          skip_after_successful_duplicate: 'false'
          do_not_skip: '[]'

  run_pipeline:
    needs: maybe_skip
    if: needs.maybe_skip.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10.x

      - uses: syphar/restore-virtualenv@v1
        id: cache-virtualenv
        with:
          requirement_files: requirements_github_action.txt

      - uses: syphar/restore-pip-download-cache@v1
        if: steps.cache-virtualenv.outputs.cache-hit != 'true'

      - run: pip install -r requirements_github_action.txt
        if: steps.cache-virtualenv.outputs.cache-hit != 'true'

      - name: Debug Environment Variables
        run: echo $DESTINATION__BIGQUERY__CREDENTIALS__PRIVATE_KEY | base64 -d | jq -R 'split("\n")'

      - name: Create GCP Credentials File
        run: |
          echo "{\"type\": \"service_account\", \"project_id\": \"$DESTINATION__BIGQUERY__CREDENTIALS__PROJECT_ID\", \"private_key_id\": \"\", \"private_key\": \"$DESTINATION__BIGQUERY__CREDENTIALS__PRIVATE_KEY\", \"client_email\": \"$DESTINATION__BIGQUERY__CREDENTIALS__CLIENT_EMAIL\", \"client_id\": \"\", \"auth_uri\": \"https://accounts.google.com/o/oauth2/auth\", \"token_uri\": \"https://oauth2.googleapis.com/token\", \"auth_provider_x509_cert_url\": \"https://www.googleapis.com/oauth2/v1/certs\", \"client_x509_cert_url\": \"https://www.googleapis.com/robot/v1/metadata/x509/$DESTINATION__BIGQUERY__CREDENTIALS__CLIENT_EMAIL\"}" > $HOME/gcp_credentials.json
          cat $HOME/gcp_credentials.json

      - name: Set environment variables
        run: echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcp_credentials.json" >> $GITHUB_ENV

      - name: Debug GCP Credentials
        run: cat $HOME/gcp_credentials.json

      -
