name: Run mfl_players pipeline from players.py

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: null

env:
  DESTINATION__BIGQUERY__CREDENTIALS__PROJECT_ID: mfl-374514
  DESTINATION__BIGQUERY__CREDENTIALS__CLIENT_EMAIL: mfl-orchestrator@mfl-374514.iam.gserviceaccount.com
  DESTINATION__BIGQUERY__LOCATION: US
  API_SECRET_KEY: ${{ secrets.API_SECRET_KEY }}
  DESTINATION__BIGQUERY__CREDENTIALS__PRIVATE_KEY: ${{ secrets.DESTINATION__BIGQUERY__CREDENTIALS__PRIVATE_KEY }}

jobs:
  maybe_skip:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@v5
        with:
          concurrent_skipping: always
          skip_after_successful_duplicate: 'false'
          do_not_skip: '[]'

  run_pipeline:
    needs: maybe_skip
    if: needs.maybe_skip.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10.x

      - uses: syphar/restore-virtualenv@v1
        id: cache-virtualenv
        with:
          requirement_files: requirements_github_action.txt

      - uses: syphar/restore-pip-download-cache@v1
        if: steps.cache-virtualenv.outputs.cache-hit != 'true'

      - run: pip install -r requirements_github_action.txt
        if: steps.cache-virtualenv.outputs.cache-hit != 'true'

      - name: Debug Secret Value
        run: echo "${{ secrets.DESTINATION__BIGQUERY__CREDENTIALS__PRIVATE_KEY }}"


      - name: Debug Environment Variables
        run: |
          echo "DESTINATION__BIGQUERY__CREDENTIALS__PRIVATE_KEY: $DESTINATION__BIGQUERY__CREDENTIALS__PRIVATE_KEY"
          echo "API_SECRET_KEY: $API_SECRET_KEY"
          echo "GOOGLE_APPLICATION_CREDENTIALS: $GOOGLE_APPLICATION_CREDENTIALS"

      - name: Set up GCP credentials
        run: echo "$GCP_CREDENTIALS" > $HOME/gcp_credentials.json

      - name: Set environment variables
        run: echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcp_credentials.json" >> $GITHUB_ENV

      - name: Debug GCP Credentials
        run: cat $HOME/gcp_credentials.json

      - name: Run pipeline script
        run: python 'players.py'
